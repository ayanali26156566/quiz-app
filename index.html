<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Quiz-management-app</title>
        <link rel="stylesheet" href="style.css">
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
        <style>
       
    </style>

    </head>

    <body>
        <!-- signup -->
        <form onsubmit="form(event)" id="signup">
            <h1><span style="color: #0F172A;">..</span> Create Account<span
                    style="color: #0F172A;">..</span> </h1>

            <div class="form-group">
                <input type="text" class="name-inp" id="name"
                    placeholder=" " required>
                <label class="name">Name</label>
            </div>
            <div class="form-group">
                <input type="email" class="name-inp" id="email"
                    placeholder=" " required>
                <label class="name">Email</label>
            </div>
            <div class="form-group  ">
                <input type="password" class="name-inp" id="password"
                    placeholder=" " required>
                <label class="name">Password</label>

                <i class="fa-solid fa-eye eye-icon"
                    onclick="togglePassword('password', this)"></i>
            </div>

            <div class="form-group">
                <input type="password" class="name-inp" id="confirm_password"
                    placeholder=" " required>
                <label class="name">Confirm Password</label>

                <i class="fa-solid fa-eye eye-icon"
                    onclick="togglePassword('confirm_password', this)"></i>
            </div>

            <button type="submit" id="signup-btn">Sign up <span class="arrow">
                    ➜</span></button>
            <span
                class="text-white hover:text-blue-400 hover:underline cursor-pointer   have-account">
                have an account?
            </span>

        </form>

        <!-- LOGIN -->
        <form onsubmit="signinForm(event)"
            style="display: none;" id="login">
            <h1><span style="color: #0F172A;">..</span> Login<span
                    style="color: #0F172A;">..</span> </h1>
            <div class="form-group">
                <input type="email" class="name-inp" id="signin-email"
                    placeholder=" " required>
                <label class="name">Email</label>
            </div>
            <div class="form-group">
                <input type="password"
                    class="name-inp"
                    id="signin-password"
                    placeholder=" "
                    required>

                <label class="name">Password</label>

                <i class="fa-solid fa-eye eye-icon"
                    onclick="togglePassword('signin-password', this)"></i>
            </div>

            <button type="submit" id="signin-btn">Sign in <span class="arrow">
                    ➜</span></button>

            <span
                class="text-white hover:text-blue-400 hover:underline cursor-pointer   dont-have-account">
                Don't have an account?
            </span>

        </form>
        <script src="script.js">

           
            
            </script>

    </body>

</html>
